spring.application.name=backend
server.port=${PORT:8080}
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima
app.cors.allowed-origins=${APP_FRONTEND_URL}

# CONEXIÓN SQL POSTGRESQL CLOUD
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# CONEXIÓN NOSQL MONGODB CLOUD
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.database=${MONGO_DB_NAME}

# CONEXIÓN INFERENCIA MODELOS
ai.inference.url=${HF_INFERENCE_URL}

# HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=4MB
spring.servlet.multipart.max-request-size=5MB

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}
